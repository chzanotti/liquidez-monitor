name: Actualizar datos FRED

permissions:
  contents: write

on:
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      
      - name: Descargar datos de FRED
        env:
          FRED_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          mkdir -p data
          for series in WALCL RRPONTSYD WTREGEN M2SL DGS10 DTWEXBGS BAMLH0A0HYM2; do
            echo "Descargando $series..."
            curl -s "https://api.stlouisfed.org/fred/series/observations?series_id=${series}&api_key=${FRED_KEY}&file_type=json&sort_order=desc&limit=60" > "data/${series}.json"
          done
          
      - name: Guardar cambios
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/
          git commit -m "Update FRED data $(date +%Y-%m-%d)" || echo "Sin cambios"
          git push || echo "Nada para subir"
